# ============================================================================
# onion MVP 용어사전 — 이슈 카드에서 뽑은 '중학생 기준 어려운 말' 한 줄 해설
# term 은 본문 표기와 정확히 일치해야 매칭됨 (별칭은 별도 항목으로)
# ============================================================================

terms:
  - { term: 기준금리,        easy: "중앙은행이 정하는 '나라 돈값의 기준'이에요. 모든 대출·예금 금리가 여기서 출발해요.", example: "" }
  - { term: 금통위,          easy: "한국은행에서 기준금리를 투표로 정하는 7인 회의(금융통화위원회)예요.", example: "" }
  - { term: 연준,            easy: "미국의 중앙은행(Fed)이에요. 세계 돈의 방향을 정하는 가장 힘센 기관이에요.", example: "" }
  - { term: FOMC,            easy: "연준에서 금리를 정하는 회의예요. 1년에 8번 열려요.", example: "" }
  - { term: 점도표,          easy: "연준 위원들이 각자 예상하는 미래 금리를 점으로 찍은 표예요. 금리의 '예고편'이에요.", example: "" }
  - { term: 매파,            easy: "물가를 잡으려 금리를 올리자는 쪽이에요. 반대로 경기를 살리려 내리자는 쪽은 비둘기파예요.", example: "" }
  - { term: 비둘기파,        easy: "경기를 살리려 금리를 내리자는 쪽이에요. 반대는 매파예요.", example: "" }
  - { term: 긴축,            easy: "금리를 올리거나 돈줄을 조여서 시중의 돈을 줄이는 정책이에요.", example: "" }
  - { term: 인플레이션,      easy: "물가가 전반적으로 계속 오르는 현상이에요. 내 돈의 힘이 약해져요.", example: "" }
  - { term: CPI,             easy: "소비자물가지수예요. 장바구니 물가가 1년 전보다 얼마나 올랐는지 매달 재는 공식 성적표예요.", example: "" }
  - { term: 소비자물가지수,  easy: "장바구니 물가가 1년 전보다 얼마나 올랐는지 매달 재는 공식 성적표(CPI)예요.", example: "" }
  - { term: 근원물가,        easy: "출렁이는 기름값·식품값을 뺀 물가예요. 물가의 '진짜 체력'을 보여줘요.", example: "" }
  - { term: 생활물가,        easy: "자주 사는 141개 품목만 골라 잰 물가예요. 체감 물가에 가장 가까워요.", example: "" }
  - { term: 서킷브레이커,    easy: "주가가 하루 8% 넘게 폭락하면 20분간 거래를 강제로 멈추는 장치예요.", example: "" }
  - { term: 사이드카,        easy: "선물 가격이 급변하면 프로그램 매매만 5분간 멈추는, 서킷브레이커의 동생이에요.", example: "" }
  - { term: 레버리지,        easy: "빚이나 파생상품으로 수익과 손실을 몇 배로 키우는 투자 방식이에요.", example: "" }
  - { term: 레버리지 ETF,    easy: "지수나 주가의 하루 움직임을 2배로 따라가는 상품이에요. 수익도 손실도 2배예요.", example: "" }
  - { term: ADR,             easy: "외국 회사 주식을 미국 시장에서 달러로 사고팔 수 있게 만든 증서(주식예탁증서)예요.", example: "" }
  - { term: IPO,             easy: "회사가 처음으로 주식을 시장에 내놓고 파는 것(기업공개)이에요. '상장'이라고도 해요.", example: "" }
  - { term: 공모,            easy: "상장하며 새 주식을 여러 사람에게 파는 절차예요. 그때 최초 가격이 공모가예요.", example: "" }
  - { term: 시가총액,        easy: "주가 × 주식 수. 회사의 시장 몸값이에요.", example: "" }
  - { term: 순매수,          easy: "판 것보다 산 게 많다는 뜻이에요. 외국인 순매수는 코스피 방향의 핵심 지표예요.", example: "" }
  - { term: 잠정실적,        easy: "확정 전에 먼저 알려주는 실적 속보치예요. 매출·영업이익 두 숫자만 나와요.", example: "" }
  - { term: 영업이익,        easy: "본업으로 번 돈에서 본업 비용을 뺀, 회사의 진짜 장사 실력이에요.", example: "" }
  - { term: PER,             easy: "주가가 이익의 몇 배인지예요. 낮을수록 싸지만, 성장 걱정의 표시일 수도 있어요.", example: "" }
  - { term: 버블,            easy: "실제 가치보다 가격이 훨씬 비싸진 상태(거품)예요. 터지기 전엔 확신하기 어려워요.", example: "" }
  - { term: HBM,             easy: "AI 계산에 쓰는 초고속 메모리 반도체예요. 지금 반도체 호황의 주인공이에요.", example: "" }
  - { term: 파운드리,        easy: "남이 설계한 반도체를 대신 생산해 주는 사업이에요. TSMC가 세계 1위예요.", example: "" }
  - { term: 슈퍼사이클,      easy: "가격과 수요가 몇 년씩 이어지는 초대형 호황이에요. 반대말은 '피크아웃(정점 통과)'이에요.", example: "" }
  - { term: 피크아웃,        easy: "호황이 정점을 지나 꺾이기 시작하는 순간이에요.", example: "" }
  - { term: 상호관세,        easy: "\"너희가 매기는 만큼 우리도 매긴다\"며 나라별로 일괄로 매긴 미국 관세예요.", example: "" }
  - { term: 301조,           easy: "불공정 무역을 이유로 미국이 보복 관세를 매길 수 있게 한 법(무역법 301조)이에요.", example: "" }
  - { term: 해상봉쇄,        easy: "군함으로 바닷길을 막아 배가 오가지 못하게 하는 조치예요.", example: "" }
  - { term: MOU,             easy: "\"이렇게 하기로 해요\"라는 약속 문서(양해각서)예요. 조약보다 법적 구속력이 약해요.", example: "" }
  - { term: 양해각서,        easy: "\"이렇게 하기로 해요\"라는 약속 문서(MOU)예요. 조약보다 법적 구속력이 약해요.", example: "" }
  - { term: 보유세,          easy: "집을 갖고 있는 동안 매년 내는 세금이에요(재산세+종합부동산세).", example: "" }
  - { term: 공정시장가액비율, easy: "집값 중 얼마를 세금 계산에 쓸지 정하는 비율이에요. 올리면 세금이 늘어요.", example: "" }
  - { term: 셧다운,          easy: "예산이 합의되지 않아 정부가 문을 닫는 거예요. 필수 기능만 남기고 멈춰요.", example: "" }
  - { term: 스테이블코인,    easy: "달러 같은 실제 돈에 가치를 고정한 코인이에요. 1달러 = 1코인이 원칙이에요.", example: "" }
  - { term: 강제청산,        easy: "빚내서 산 포지션이 손실 한도를 넘겨 내 의지와 상관없이 강제로 팔리는 거예요.", example: "" }
  - { term: 규제지역,        easy: "집값 과열을 막으려 대출·세금·거래 요건을 강하게 묶은 지역이에요.", example: "" }
  - { term: 토지거래허가,    easy: "집·땅을 살 때 구청 허가를 받아야 하는 제도예요. 실거주 목적이 아니면 사기 어려워요.", example: "" }
  - { term: 전세수급지수,    easy: "전세를 구하는 사람과 내놓는 사람의 균형이에요. 100보다 크면 구하는 쪽이 더 많아요.", example: "" }
  - { term: 가이던스,        easy: "회사가 스스로 내놓는 '앞으로의 실적 전망'이에요. 실적 시즌엔 숫자보다 이게 주가를 움직여요.", example: "" }
