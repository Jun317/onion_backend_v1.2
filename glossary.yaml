# 용어 사전 — 어려운 경제·금융 용어 → 배경지식 없는 사람용 한 줄 설명
# engine/glossary.py 가 이슈의 표시 텍스트(title/one_liner/why_now/details)에서
# 등장 용어를 찾아 정의와 함께 내보낸다 (프런트 툴팁용). 확장은 여기 추가만.
# key: 본문에 그대로 등장하는 표기 / value: 쉬운 설명 (한 문장, 반말 금지)
