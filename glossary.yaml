기준금리: "중앙은행이 정하는 '돈의 기본 값'. 이게 오르면 대출·예금 이자가 대체로 같이 올라가요."
금리: "돈을 빌리거나 맡길 때 붙는 이자의 비율이에요."
금리 인하: "기준금리를 낮추는 것. 대출 이자가 줄고 돈이 돌기 쉬워져요."
금리 인상: "기준금리를 올리는 것. 대출 이자가 늘고 물가를 누르는 효과가 있어요."
통화정책: "중앙은행이 금리·돈의 양을 조절해 경기와 물가를 관리하는 정책이에요."
양적긴축: "중앙은행이 시중에 풀린 돈을 다시 거둬들여 돈줄을 조이는 것이에요."
양적완화: "중앙은행이 돈을 더 풀어 경기를 부양하는 것이에요."
FOMC: "미국의 기준금리를 결정하는 회의예요. 세계 금융시장이 결과를 크게 주목해요."
연준: "미국의 중앙은행(Fed). 미국 기준금리를 정하는 곳이에요."
한국은행: "우리나라의 중앙은행. 한국 기준금리를 정하는 곳이에요."
CPI: "소비자물가지수. 생활 물가가 얼마나 올랐는지 보여주는 대표 지표예요."
소비자물가: "우리가 사는 물건·서비스 값이 얼마나 올랐는지 나타내는 지표예요."
인플레이션: "물가가 전반적으로 오르는 현상이에요. 같은 돈으로 살 수 있는 게 줄어요."
근원 CPI: "가격이 들쭉날쭉한 식품·에너지를 뺀 물가 지표예요. 흐름을 더 잘 보여줘요."
PCE: "미국 연준이 특히 중요하게 보는 또 다른 물가 지표예요."
GDP: "한 나라가 일정 기간 만들어낸 부가가치의 총합. 경제 규모를 나타내요."
실업률: "일할 의사가 있는 사람 중 일자리를 못 구한 사람의 비율이에요."
기준금리 동결: "금리를 올리지도 내리지도 않고 그대로 두는 것이에요."
매파: "물가를 잡으려 금리를 올리려는 쪽 성향을 가리키는 말이에요."
비둘기파: "경기를 살리려 금리를 내리려는 쪽 성향을 가리키는 말이에요."
환율: "우리 돈과 외국 돈을 바꾸는 비율. 원/달러 환율이 오르면 달러가 비싸진 거예요."
원/달러: "1달러를 사는 데 필요한 원화 금액이에요."
관세: "수입 물건에 매기는 세금. 오르면 그 물건 값이 비싸지기 쉬워요."
보복관세: "상대국 관세에 맞서 똑같이 매기는 관세예요."
상호관세: "서로 주고받는 형태로 매기는 관세예요."
국채: "정부가 돈을 빌리려고 발행하는 채권이에요. 금리 흐름의 기준이 돼요."
국채 금리: "정부가 빌린 돈에 붙는 이자율. 시장 금리의 대표 지표예요."
영업이익: "기업이 본업으로 번 이익이에요. 실적이 좋은지 보는 핵심 숫자예요."
순이익: "모든 비용·세금을 빼고 최종적으로 기업에 남은 이익이에요."
잠정실적: "정식 확정 전에 먼저 발표하는 대략적인 실적이에요."
어닝: "기업의 분기·연간 실적을 뜻하는 말이에요."
HBM: "AI 반도체에 쓰이는 고성능 메모리예요. 삼성전자·SK하이닉스가 주력이에요."
DRAM: "컴퓨터·스마트폰에 쓰이는 기본 메모리 반도체예요."
bp: "이자율 단위. 1bp는 0.01%예요. 25bp면 0.25%를 뜻해요."
코스피: "우리나라 대표 주가지수. 국내 큰 기업들의 주가를 묶어 보여줘요."
코스닥: "주로 중소·벤처 기업이 상장된 우리나라 주식시장이에요."
