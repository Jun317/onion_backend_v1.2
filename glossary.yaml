# ============================================================================
# 용어 사전 — 어려운 경제·금융 용어 → 경제 문외한도 바로 이해하는 해설
#
# 값 구조:
#   용어:
#     easy: "일상어로만 쓴 핵심 한 문장. 다른 전문용어 금지. 40자 내외. '~요'로 끝."
#     example: "내 생활에 어떻게 와닿는지 한 문장(선택)."
#     aliases: [본문에 다르게 표기될 수 있는 말]   # 선택
#
# 작성 규칙 (engine/glossary.py lint 가 자동 검사):
#   ① 해설에 '하드워드'(config glossary_hard_words) 사용 금지 — 쓰려면 풀어쓰기.
#   ② easy 는 짧고(≤50자) '~요'로 끝나게. ③ 숫자는 쉬운 환산(25bp=0.25%).
#   ④ 사전에 있는 다른 용어는 참조 가능(툴팁으로 탭하면 되니까) — 단 최소화.
# 새 용어는 여기 추가만. 초안은 `python -m engine.glossary_draft <용어>` 로 도움받을 수 있음.
# ============================================================================

중앙은행:
  easy: "나라의 돈을 관리하고 이자율을 정하는 특별한 은행이에요."
  example: "우리나라는 한국은행, 미국은 연준이 여기예요."
채권:
  easy: "돈을 빌리면서 '언제까지 갚겠다'고 써주는 증서예요."
  example: "정부나 기업이 돈을 모을 때 발행해요."

기준금리:
  easy: "나라 전체 이자의 '기준점'이 되는 값이에요."
  example: "이게 오르면 내 대출 이자도 대체로 같이 올라요."
  aliases: [기준 금리]
금리:
  easy: "돈을 빌리거나 맡길 때 붙는 이자의 비율이에요."
  example: "높을수록 이자를 더 내거나 더 받아요."
금리 인하:
  easy: "이자의 기준을 낮추는 거예요."
  example: "대출 이자가 줄어 돈 쓰기가 조금 수월해져요."
금리 인상:
  easy: "이자의 기준을 올리는 거예요."
  example: "대출 이자가 늘고 물가를 누르는 효과가 있어요."
기준금리 동결:
  easy: "이자의 기준을 올리지도 내리지도 않고 그대로 두는 거예요."
  example: "당분간 지켜보겠다는 뜻이에요."
통화정책:
  easy: "나라가 이자와 돈의 양을 조절해 경기를 관리하는 거예요."
  example: "경기가 나쁘면 이자를 낮춰 돈이 돌게 해요."
양적완화:
  easy: "나라가 돈을 많이 풀어 경기를 살리려는 방법이에요."
  example: "시중에 돈이 늘어 투자와 소비가 살아나길 기대해요."
양적긴축:
  easy: "풀렸던 돈을 다시 거둬들여 돈줄을 조이는 거예요."
  example: "물가가 너무 오를 때 열기를 식히려고 해요."
매파:
  easy: "물가를 잡으려 이자를 올리자는 쪽 성향이에요."
  example: "매파가 힘을 얻으면 이자가 오르기 쉬워요."
비둘기파:
  easy: "경기를 살리려 이자를 내리자는 쪽 성향이에요."
  example: "비둘기파가 우세하면 이자 인하 기대가 커져요."

FOMC:
  easy: "미국의 이자를 정하는 중요한 회의예요."
  example: "결과에 따라 전 세계 주식·환율이 출렁여요."
연준:
  easy: "미국의 돈을 관리하는 중앙은행(Fed)이에요."
  example: "미국의 이자를 여기서 정해요."
한국은행:
  easy: "우리나라 돈을 관리하는 중앙은행이에요."
  example: "한국 기준금리를 여기서 정해요."

CPI:
  easy: "물가가 얼마나 올랐는지 보여주는 대표 성적표예요."
  example: "높으면 생활비 부담이 커진 거예요."
소비자물가:
  easy: "우리가 사는 물건·서비스 값이 오른 정도예요."
  example: "오르면 같은 돈으로 살 수 있는 게 줄어요."
  aliases: [소비자물가지수]
근원 CPI:
  easy: "값이 널뛰는 기름·식품을 뺀 물가 숫자예요."
  example: "진짜 물가 흐름을 더 잘 보여줘요."
인플레이션:
  easy: "물가가 전반적으로 계속 오르는 현상이에요."
  example: "돈의 힘이 조금씩 약해지는 셈이에요."
PCE:
  easy: "미국이 특히 중요하게 보는 또 다른 물가 숫자예요."
  example: "연준이 이 값을 눈여겨봐요."
GDP:
  easy: "한 나라가 일정 기간 벌어들인 값의 총합이에요."
  example: "경제 규모가 얼마나 큰지 보여줘요."
실업률:
  easy: "일하고 싶은 사람 중 일자리를 못 구한 비율이에요."
  example: "높을수록 경기가 나쁘다는 신호예요."

환율:
  easy: "우리 돈과 외국 돈을 바꾸는 비율이에요."
  example: "오르면 외국 돈이 그만큼 비싸진 거예요."
원/달러:
  easy: "1달러를 사는 데 드는 우리 돈의 액수예요."
  example: "1,300원이면 1달러에 1,300원이 든다는 뜻이에요."
  aliases: [원달러, 원·달러]

관세:
  easy: "수입 물건에 매기는 세금이에요."
  example: "오르면 그 물건 값이 비싸지기 쉬워요."
보복관세:
  easy: "상대 나라 세금에 맞서 똑같이 매기는 세금이에요."
  example: "나라 간 무역 다툼이 커질 때 나와요."
상호관세:
  easy: "서로 주고받는 형태로 매기는 세금이에요."

국채:
  easy: "정부가 돈을 빌리며 써준 '나라의 차용증'이에요."
  example: "여기 붙는 이자가 시장 이자의 기준이 돼요."
국채 금리:
  easy: "정부가 빌린 돈에 붙는 이자의 비율이에요."
  example: "시장 전체 이자의 대표 잣대예요."

영업이익:
  easy: "기업이 본업으로 벌어들인 이익이에요."
  example: "장사를 잘했는지 보는 핵심 숫자예요."
순이익:
  easy: "비용·세금까지 다 빼고 최종으로 남은 이익이에요."
잠정실적:
  easy: "확정 전에 먼저 알리는 대략적인 성적표예요."
  example: "정식 숫자와 조금 달라질 수 있어요."
어닝:
  easy: "기업의 분기·연간 성적을 뜻하는 말이에요."

HBM:
  easy: "AI에 쓰이는 아주 빠른 고급 메모리 반도체예요."
  example: "삼성전자·SK하이닉스가 주력으로 만들어요."
DRAM:
  easy: "컴퓨터·스마트폰에 들어가는 기본 메모리 반도체예요."
bp:
  easy: "이자를 재는 아주 작은 단위예요. 1bp는 0.01%예요."
  example: "25bp면 0.25%를 뜻해요."

코스피:
  easy: "한국 대표 기업들의 주가를 묶어 보여주는 값이에요."
  example: "오르면 큰 기업 주가가 대체로 올랐다는 뜻이에요."
코스닥:
  easy: "주로 중소·벤처 기업이 모인 한국 주식시장이에요."
