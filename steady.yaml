# ============================================================================
# 스테디 이슈 — 수동 큐레이션 (redesignspec §5 + v2.3 확장)
# index.json 최상위 "steady" 배열로 export 된다 (engine/export.py:_load_steady).
#
# 작성 규칙:
#   - id: 고유 슬러그 (변경하면 프런트 라우트가 바뀌므로 유지 권장)
#   - one_liner: 핵심 요약 한줄 — 해요체·순화 (이슈 페이지 UX 라이팅 준수)
#   - latest_match: 주제의 "가장 최근 핵심 이슈" 자동 해석 규칙.
#       categories / keywords(제목 부분 포함) / entities(entity_keys 교집합) — AND 결합.
#       수동 고정은 issue_id 또는 anchor_key. 매칭 실패 시 앱에서 섹션 숨김.
#   - impact: 경제(주식·채권·물가·금리) 영향 문장들 (해요체)
#   - table: 핵심 수치 표 {title, columns, rows, source} — 수치엔 출처 필수, 3열 이내 권장
#   - visual_type: engine/viz.py REGISTRY 타입 재사용 (생략/실패 시 차트 없이 발행)
#   - detail[].refs: 문단 속 이슈 언급 링크. phrase 는 반드시 text 에 포함,
#       issue_id/anchor_key 가 발행 중(active/stale)이 아니면 링크만 조용히 제거.
#   - 문체: 해요체. 콘텐츠 관리는 큐레이터(사용자) 몫.
#
# 아래 4건은 2026-07 웹 조사 기반 실사건 (수치·일자는 언론 보도 확인분만 사용).
# 하위 이슈 id 는 data/seed/major_events.yaml 의 급행 이벤트에서 결정적으로 생성됨.
# ============================================================================

items:
  - id: us-iran-war
    icon: "⚔️"
    title: 미국-이란 전쟁
    one_liner: 미국과 이란이 종전 협상 중이지만, 호르무즈를 둘러싼 긴장은 여전해요.
    status_note: 2026년 2월부터 지켜보는 중
    latest_match:
      categories: [GEO, FX]
      keywords: [이란, Iran, 호르무즈, Hormuz]
    impact:
      - 전쟁이 격해지면 유가가 뛰고, 기름값과 물가가 따라 오를 수 있어요.
      - 물가가 오르면 각국 중앙은행이 금리를 내리기 어려워져요.
      - 종전 협상이 잘 풀리면 주식시장에는 보통 호재로 작용해요.
    table:
      title: 한눈에 보는 전쟁 상황
      columns: ["", 미국 진영, 이란 진영]
      rows:
        - [개전(2/28), 미국·이스라엘 합동 공습, 미사일·드론 반격]
        - [지도부, "—", 하메네이 등 수뇌부 사망]
        - [주요 카드, 핵시설 타격·경제 제재, 호르무즈 해협 봉쇄]
        - [경제 충격, "유가 급등 (WTI 최고 111.24달러)", 제재·해외 자산 동결]
        - [현재(7월), 60일 최종 협상 진행, 협상 재개와 도발 병행]
      source: 위키백과·SBS·MBC·한국일보 보도 종합 (2026-07)
    detail:
      - text: >-
          2026년 2월 28일, 미국과 이스라엘의 합동 공습으로 전쟁이 시작됐어요.
          이 공습으로 이란 최고지도자 하메네이를 포함한 수뇌부가 사망했어요.
        refs:
          - phrase: 전쟁이 시작
            issue_id: ec247238ef99e4f49
      - text: >-
          이란은 곧바로 호르무즈 해협을 봉쇄했고, 전 세계 유가가 40% 넘게
          뛰었어요. 3월엔 배럴당 111달러를 넘기도 했어요.
        refs:
          - phrase: 호르무즈 해협을 봉쇄
            issue_id: e5f941b1992f60ad9
      - text: >-
          106일 만인 6월 14일, 두 나라는 종전 협상 타결에 이르렀어요. 지금은
          핵 프로그램과 제재 해제를 놓고 60일 시한의 최종 협상이 진행 중이에요.
        refs:
          - phrase: 종전 협상 타결
            issue_id: ee485151a110a7beb
      - text: >-
          다만 7월 들어 이란의 도발이 다시 시작되면서 긴장이 완전히 풀리진
          않았어요. 유가와 물가가 다시 흔들릴 수 있어 계속 지켜봐야 해요.

  - id: kospi-rally
    icon: "📈"
    title: 코스피 급등 랠리
    one_liner: 코스피가 반도체와 종전 기대에 힘입어 반년 만에 두 배가 됐어요.
    status_note: 2026년 상반기 내내 화제
    visual_type: kospi_close
    latest_match:
      categories: [MARKET]
      keywords: [코스피, KOSPI]
    impact:
      - 주가가 크게 오른 만큼, 작은 악재에도 시장이 출렁일 수 있어요.
      - 반도체 수출이 잘되면 원화가 강해지는 경향이 있어요.
      - 단기 급등 뒤에는 차익을 챙기려는 매도 물량이 나오기도 해요.
    table:
      title: 숫자로 보는 랠리
      columns: [지표, 수치]
      rows:
        - [상반기 시작(1월), "4,214.17pt"]
        - [상반기 마감(6월), "8,476.48pt"]
        - [상반기 상승률, "+101.14%"]
        - [종전 최고 기록, "1999년 상반기 +56.99%"]
        - ["첫 8,400 돌파", "5월 27일 (하루 +4.97%)"]
      source: 한국거래소 집계·뉴시스 (2026-06-30)
    detail:
      - text: >-
          코스피는 올해 상반기에만 두 배가 됐어요. 4,214에서 8,476까지, 역대
          어떤 상반기보다 뜨거웠어요.
        refs:
          - phrase: 두 배가 됐어요
            issue_id: eb742211d6b920cb4
      - text: >-
          5월 27일엔 사상 처음 8,400선을 돌파했어요. 삼성전자의 차세대 반도체
          (HBM4E)와 중동 종전 기대가 함께 힘을 보탰어요.
        refs:
          - phrase: 8,400선을 돌파
            issue_id: e382db26d7ba873bd
      - text: >-
          다만 6월 말엔 하루 급락을 겪는 등 변동성도 커지고 있어요. 오른 만큼
          조정 가능성도 함께 봐야 해요.

  - id: china-taiwan
    icon: "🇹🇼"
    title: 중국의 대만 침공 준비
    one_liner: 중국이 대만 침공 훈련을 거듭하면서 반도체 공급망 불안이 커지고 있어요.
    status_note: 2026년 3월부터 지켜보는 중
    latest_match:
      categories: [GEO]
      keywords: [대만, Taiwan, 타이완]
    impact:
      - 대만해협이 불안하면 전 세계 반도체 공급망이 함께 흔들려요.
      - 긴장이 높아지면 달러·금 같은 안전자산으로 돈이 몰려요.
      - 한국 반도체는 반사이익과 공급망 충격을 동시에 받을 수 있어요.
    table:
      title: 긴장 고조 일지
      columns: [시점, 움직임]
      rows:
        - [3월 16일, "중국, 육해공·로켓군 대규모 상륙훈련 공개"]
        - [미군 평가, "\"2027년까지 침공 준비 완료\" (인태사령관)"]
        - [6월 22일, "대만군, 즉각 대비태세 훈련 돌입"]
        - [8월 5일~, 대만 한광 42호 훈련 (9박 10일)]
      source: 코스미안뉴스·서울경제·뉴시스·경향신문 보도
    detail:
      - text: >-
          중국은 3월에 대만을 겨냥한 대규모 상륙훈련을 공개했어요. 미군
          인도태평양사령관은 "중국이 2027년까지 침공 준비를 마친다"고 평가했어요.
        refs:
          - phrase: 대규모 상륙훈련
            issue_id: ee586a6d38f0760c0
      - text: >-
          대만은 주변 해역에 중국 군함이 늘자 8월 한광 훈련을 앞두고 침공 대비
          훈련을 확대하고 있어요.
        refs:
          - phrase: 침공 대비 훈련
            issue_id: e363535c6eac19a8d
      - text: >-
          대만해협이 막히면 전 세계 반도체 공급망이 함께 흔들려요. 반도체
          수출국인 한국 경제와도 바로 연결되는 문제예요.

  - id: us-rate-cycle
    icon: "🏦"
    title: 미국 금리 인하 사이클
    one_liner: 미국이 금리를 어디까지, 얼마나 빨리 내릴지가 전 세계 돈의 방향을 정해요.
    status_note: 2024년부터 지켜보는 중
    visual_type: us_policy_rate
    latest_match:
      categories: [RATE]
      entities: [FED]
    impact:
      - 금리가 내리면 대출 이자 부담이 줄어요.
      - 예금 이자도 같이 낮아지는 게 보통이에요.
      - 낮아진 금리는 주식·부동산으로 돈이 몰리게 만들어요.
    table:
      title: 숫자로 보는 금리
      columns: [지표, 수치]
      rows:
        - [미국 기준금리, "3.62% (2026년 7월)"]
        - [한국 기준금리, "3.00% (2026년 7월)"]
        - [방향, 2024년부터 단계적 인하]
      source: FRED·한국은행 ECOS
    detail:
      - text: >-
          미국 중앙은행(연준)은 물가를 잡으려고 올렸던 금리를 2024년부터
          단계적으로 내리고 있어요. 너무 빨리 내리면 물가가 다시 오를 수
          있어서 속도 조절이 관건이에요.
      - text: >-
          가장 최근 움직임은 미국 기준금리 인하 이슈에서 볼 수 있어요.
          연준의 결정은 한국은행의 금리 결정과 원/달러 환율에도 바로
          영향을 줘요.
        refs:
          - phrase: 미국 기준금리 인하
            issue_id: e77a7b1c911ca1d26
      - text: >-
          중동 전쟁으로 유가가 흔들리면 물가가 다시 오를 수 있어서, 금리
          인하 속도가 느려질 수 있다는 점도 함께 봐야 해요.
