# ============================================================================
# 스테디 이슈 — 수동 큐레이션 (redesignspec §5)
# index.json 최상위 "steady" 배열로 export 된다 (engine/export.py:_load_steady).
#
# 작성 규칙:
#   - id: 고유 슬러그 (변경하면 프런트 라우트가 바뀌므로 유지 권장)
#   - visual_type: engine/viz.py REGISTRY 의 타입 재사용 (생략/실패 시 차트 없이 발행)
#   - detail[].refs: 문단 속 이슈 언급 링크.
#       phrase   — 반드시 text 에 그대로 포함된 문자열 (아니면 export 가 링크 제거)
#       issue_id — 이슈 id 직접 지정, 또는
#       anchor_key — 급행 이슈 키(entity|category|period)로 지정 (id 를 몰라도 됨)
#       참조 이슈가 발행 중(active/stale)이 아니면 링크만 조용히 제거되고 본문은 유지된다.
#   - 문체: 해요체. 콘텐츠 관리는 큐레이터(사용자) 몫.
# ============================================================================

items:
  - id: us-rate-cycle
    icon: "🏦"
    title: 미국 금리 인하 사이클
    one_liner: 미국이 금리를 어디까지, 얼마나 빨리 내릴지가 전 세계 돈의 방향을 정해요.
    status_note: 2024년부터 지켜보는 중
    visual_type: us_policy_rate
    detail:
      - text: >-
          미국 중앙은행(연준)은 물가를 잡으려고 올렸던 금리를 2024년부터
          단계적으로 내리고 있어요. 금리가 내려가면 돈 빌리기가 쉬워져서
          소비와 투자가 살아나지만, 너무 빨리 내리면 물가가 다시 오를 수
          있어서 속도 조절이 관건이에요.
      - text: >-
          가장 최근 움직임은 미국 기준금리 인하 이슈에서 볼 수 있어요.
          연준의 결정은 한국은행의 금리 결정과 원/달러 환율에도 바로
          영향을 줘요.
        refs:
          - phrase: 미국 기준금리 인하
            anchor_key: Fed|RATE|2026-07
