# ============================================================================
# 황금세트 — 군집 임계값(tau_join) 튜닝용 라벨 데이터
#
# 각 쌍: 두 기사 제목이 '같은 이슈로 묶여야 하는가(same)'를 사람이 라벨링.
#   same: true  → 같은 사건 (묶여야 함)
#   same: false → 다른 사건 (묶이면 안 됨)
# engine/evaluate.py 가 각 쌍의 코사인 유사도를 재고, tau 후보별 정밀도/재현율/F1을
# 출력한다. F1 최고 지점을 config.yaml cluster.tau_join 후보로 삼는다.
#
# 아래는 시작용 예시 12쌍이다. 실제 뉴스로 20~50쌍 이상 채울수록 튜닝이 정확해진다.
# (경계 사례 — '비슷하지만 다른 사건' — 를 넣는 것이 특히 중요하다.)
# ============================================================================

pairs:
  # --- 같은 사건 (same: true) ---
  - a: "한국은행, 기준금리 0.25%p 인하해 연 3.00%로"
    b: "한은 기준금리 3.00%로 내려…연내 추가 인하 시사"
    same: true
  - a: "삼성전자 2분기 영업이익 10조원 돌파"
    b: "삼성전자, 2분기 잠정 영업이익 10조…반도체 회복"
    same: true
  - a: "미 연준, 기준금리 0.25%p 인하…연 4.00~4.25%"
    b: "Fed cuts rates by quarter point to 4.00-4.25%"
    same: true
  - a: "코스피 3.26% 급등 8471 마감…또 사상 최고"
    b: "코스피 사상 최고 경신, 8471포인트 마감"
    same: true
  - a: "미국, 첨단 반도체에 25% 관세 부과"
    b: "트럼프, AI 반도체 25% 관세 포고…내일 발효"
    same: true
  - a: "SK하이닉스 HBM 내년 물량 완판"
    b: "SK하이닉스, 내년 HBM 공급 사실상 매진"
    same: true

  # --- 다른 사건 (same: false) — 경계 사례 포함 ---
  - a: "한국은행, 기준금리 0.25%p 인하"
    b: "미 연준, 기준금리 0.25%p 인하"
    same: false                       # 둘 다 금리 인하지만 다른 나라·다른 사건
  - a: "삼성전자 2분기 영업이익 10조원 돌파"
    b: "SK하이닉스 2분기 영업이익 7조원"
    same: false                       # 둘 다 실적이지만 다른 회사
  - a: "코스피 사상 최고 마감"
    b: "원/달러 환율 1350원 돌파"
    same: false
  - a: "미국 첨단 반도체 25% 관세 부과"
    b: "미국 3월 소비자물가 2.8% 상승"
    same: false
  - a: "한국은행 기준금리 인하"
    b: "삼성전자 신형 스마트폰 공개"
    same: false
  - a: "미 연준 기준금리 동결"
    b: "글로벌 해운 운임 급락"
    same: false
