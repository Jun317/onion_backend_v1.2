# ============================================================================
# 과거 1년 굵직한 뉴스 시드 (engine/backfill.py 가 소비)
#
# - 각 이벤트: gdelt_query 로 실제 과거 기사(실URL)를 먼저 조회하고,
#   2건 미만이면 아래 articles(수기 헤드라인)로 보충한다.
# - 수기 headline 의 url 은 https://backfill.example/... 합성 주소다
#   (실기사가 아님을 명시하기 위한 표기 — 제목·날짜·수치는 실제 사실 기반).
# - min_publish(출처 2) 통과를 위해 이벤트당 출처(source)를 서로 다르게 구성.
# - express 는 공식 수치가 확실한 이벤트에만 부여 (숫자는 검증된 실측값).
#   금리 변동 이벤트는 여기 넣지 않는다 — backfill.py 가 FRED/ECOS 실데이터로 생성.
# ============================================================================

events:
  - id: us_iran_strikes
    date: "2025-06-22"
    note: 미군, 이란 핵시설 3곳(포르도·나탄즈·이스파한) 공습 — 유가·지정학 리스크
    gdelt_query: 'sourcelang:english (Iran AND (airstrike OR "nuclear site" OR Fordow))'
    articles:
      - { title: "美, 이란 핵시설 3곳 전격 공습…포르도·나탄즈·이스파한 타격",
          url: "https://backfill.example/us_iran_strikes/1", source: 연합뉴스,
          published_at: "2025-06-22T03:00:00+00:00", lang: ko }
      - { title: "US strikes three Iranian nuclear sites in unprecedented attack",
          url: "https://backfill.example/us_iran_strikes/2", source: reuters.com,
          published_at: "2025-06-22T04:10:00+00:00", lang: en }
      - { title: "이란, 호르무즈 해협 봉쇄 위협…국제 유가 급등 우려",
          url: "https://backfill.example/us_iran_strikes/3", source: 한국경제,
          published_at: "2025-06-22T09:30:00+00:00", lang: ko }

