name: collect-fast

# L1 수집 (공시·뉴스): DART · EDGAR · GDELT · 부처 RSS — 30분 주기 (설계서 §02)
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# 커밋 워크플로 3개(collect-fast/slow, pipeline)는 같은 그룹으로 직렬화 — push 경합 방지
concurrency:
  group: repo-commit
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install requests pyyaml   # 수집만이라 경량 설치
      - name: Collect (fast group)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          ONION_USER_AGENT: 'onion-backend/1.2 (github actions; contact via repo)'
        run: python -m engine.run_collect --group fast
      - name: Commit data
        run: |
          git config user.name "onion-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then echo "no new data"; exit 0; fi
          git commit -m "l1: fast collect $(date -u +%FT%TZ)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "push retry $i"; sleep $((i*5))
          done
          exit 1
