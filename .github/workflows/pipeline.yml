name: pipeline

# L2 처리: 임베딩 → 군집 → LLM 가공 → export → gh-pages 배포 — 1시간 주기
on:
  schedule:
    - cron: '20 * * * *'   # collect 워크플로들과 시작 시점 분산
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: repo-commit
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      # 임베딩 모델 캐시 (e5-small ~470MB fp32) — 매 실행 재다운로드 방지
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-${{ hashFiles('config.yaml') }}
      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          ONION_USER_AGENT: 'onion-backend/1.2 (github actions; contact via repo)'
        run: python -m engine.run_pipeline
      - name: Commit state
        run: |
          git config user.name "onion-bot"
          git config user.email "actions@users.noreply.github.com"
          git add engine.db out/
          if git diff --cached --quiet; then echo "no changes"; else
            git commit -m "l2: pipeline $(date -u +%FT%TZ)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "push retry $i"; sleep $((i*5))
            done
          fi
      - name: Deploy to gh-pages
        run: |
          mkdir -p /tmp/site
          cp front/index.html /tmp/site/
          [ -d out ] && cp -r out /tmp/site/out || true
          cd /tmp/site
          git init -b gh-pages
          git config user.name "onion-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A && git commit -m "deploy $(date -u +%FT%TZ)"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
