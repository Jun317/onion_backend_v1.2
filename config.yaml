# ============================================================================
# onion_backend_v1.2 하이퍼파라미터 · 소스 설정 (설계서 §10)
# 모든 임계값은 여기서만 조정한다 — 코드 하드코딩 금지.
# ============================================================================

cluster:
  tau_join: 0.82        # 기사→이슈 편입 코사인 임계 (e5-small 분포 기준, 황금세트로 튜닝)
  tau_hold: 0.74        # 보류 큐 하한 (tau_hold ≤ best < tau_join → 다음 사이클 재평가)
  hold_max_tries: 2     # 보류 재평가 실패 허용 횟수 (초과 시 신규 후보 풀로)
  active_window_h: 72   # 배정 대상 활성 이슈 창
  centroid_alpha: 0.10  # centroid 이동평균 계수
  merge_sim: 0.86       # 이슈 병합 임계
  min_publish: 2        # 발행 최소 원출처 수 (급행 이슈는 면제)
  # 기사·이슈 양쪽 다 entity_key 가 없을 때 개체 게이트 통과 허용
  # (설계서 §04 원문은 공유 개체 ≥1 요구 — GEO 등 무개체 뉴스 군집을 위해 완화. 튜닝 대상)
  entity_gate_allow_empty: true

dedup:
  simhash_k: 3          # 제목 simhash64 해밍거리 임계
  dup_window_h: 48      # 근접중복 발행시각 창

lifecycle:
  stale_h: 72           # 무갱신 active → stale
  archive_d: 30         # → archived (export 제외)
  seed_pool_ttl_h: 72   # 미배정 단독 기사 폐기 시한 (= active_window)

embedding:
  model: intfloat/multilingual-e5-small
  dim: 384
  batch_size: 64
  prefix: "query: "     # e5 계열 입력 프리픽스

classify:
  proto_min: 0.35       # 프로토타입 임베딩 폴백 최소 유사도 (미만 → ETC)

llm:
  daily_cap: 300        # 일일 가공 상한 (초과분 다음 사이클 이월)
  temperature: 0.3
  max_output_tokens: 512
  max_headlines: 5      # 입력 대표 제목 수
  gemini_model: gemini-2.5-flash-lite
  groq_model: llama-3.3-70b-versatile
  retry_per_provider: 3
  banned_phrases: ["급등 확실", "급락 확실", "무조건", "전량 매수", "전량 매도", "반드시 오", "반드시 내"]

viz:
  cache_h: 6            # 같은 visual_type 시리즈 캐시 (이슈 간 공유)

pipeline:
  max_articles_per_run: 400   # 1사이클 임베딩 상한 (Actions 시간 보호)
  raw_lookback_h: 26          # L2 가 다시 읽는 raw JSONL 시간 창 (중복은 url_hash 로 걸러짐)

collect:
  gdelt:
    # DOC 2.0 artlist. 군집 원료 — 투자·경제 중심 키워드. 튜닝 대상.
    queries:
      - 'sourcelang:english (economy OR inflation OR "interest rate" OR earnings OR tariff OR "central bank" OR stocks)'
      - 'sourcelang:korean (금리 OR 물가 OR 실적 OR 환율 OR 증시 OR 관세)'
    timespan: 45min       # cron 30분 + 지연 여유
    max_records: 100
  edgar:
    forms: ["8-K", "10-Q", "10-K"]
    # 8-K 는 Item 2.02(실적) 표시가 있을 때만 급행 트리거
    item_202_regex: "(2\\.02|Results of Operations)"
  dart:
    # report_nm 이 이 패턴과 일치하면 급행 EARNINGS
    earnings_regex: "(잠정실적|영업(잠정)?실적|분기보고서|반기보고서|사업보고서)"
  fred:
    series:
      DFF:      { express: RATE,  entity: Fed }   # 연방기금 실효금리 — 변동 시 급행
      DGS10:    { express: null }                  # 10년물 — viz 전용
      CPIAUCSL: { express: MACRO, entity: US }     # CPI — 신규 관측 시 급행
  ecos:
    # 통계코드는 사용자가 라이선스·코드 재확인 (README 체크리스트)
    series:
      base_rate: { stat: "722Y001", item: "0101000", cycle: M, express: RATE,  entity: 한국은행 }
      usdkrw:    { stat: "731Y001", item: "0000001", cycle: D, express: null }
      cpi:       { stat: "901Y009", item: "0",       cycle: M, express: MACRO, entity: KR }
  gov_rss:
    # ★ 사이트 개편으로 자주 바뀜 — 사용자가 실제 URL 확인 필요 (README §사용자작업)
    feeds:
      - { source: 기획재정부,   url: "https://www.moef.go.kr/com/detailRssTagService.do?bbsId=MOSFBBS_000000000028", lang: ko }
      - { source: 금융위원회,   url: "https://www.fsc.go.kr/about/fsc_bodo.xml", lang: ko }
      - { source: 한국은행,     url: "https://www.bok.or.kr/portal/bbs/B0000338/news.rss?menuNo=200761", lang: ko }
      - { source: 산업통상자원부, url: "https://www.motie.go.kr/rss/motie_news.xml", lang: ko }
      - { source: "Federal Reserve", url: "https://www.federalreserve.gov/feeds/press_all.xml", lang: en }
  krx_price:   # 선택 소스 #8 — 공공데이터포털 주식시세 (키 없으면 자동 skip)
    enabled: true
  bigkinds:    # 선택 소스 #7 — 신청·심사 필요. 승인 전 스텁.
    enabled: false
    # 주의: 활성화 시 200자 스니펫은 임베딩 입력 후 즉시 폐기(DB 저장 금지) — 약관 준수
